<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Notatnik</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/dc238c17a3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <a class="back-to-main" href="../index.html">Back to main</a>
    <div class="wrapper">
        <nav>
            <div class="logo">
                <i class="fa-solid fa-file"></i>
                <h1>My Notes</h1>
            </div>
            <div class="buttons">
                <button class="add-note">
                    <p><i class="fa-solid fa-plus"></i> Dodaj</p>
                </button>
                <button class="delete-all">
                    <p><i class="fa-solid fa-trash-can"></i> Usuń wszystkie</p>
                </button>
            </div>
        </nav>
        <div class="notes"></div>

    </div>
    <div class="modal hidden">
        <h2>DODAJ NOTATKĘ</h2>
        <label for="category">Wybierz kategorię</label>
        <select id="category">
            <option value="0" disabled selected>- wybierz kategorię -</option>
            <option value="work">Praca</option>
            <option value="shopping">Zakupy</option>
            <option value="trip">Wycieczka</option>
        </select>
        <label for="category">Wpisz treść</label>
        <textarea name="category" cols="30" rows="5" placeholder="Wpisz swoją notatkę"></textarea>
        <div class="buttons">
            <button class='modal-save'>
                <p><i class="fa-solid fa-check"></i>Zapisz</p>
            </button>
            <button class='modal-exit'>
                <p><i class="fa-solid fa-ban"></i>Anuluj</p>
            </button>
        </div>
        <p class="modal-warning hidden">placeholder</p>
    </div>


    <script src="script.js" async defer></script>
</body>

</html>
