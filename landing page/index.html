<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>MJ landing page</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/dc238c17a3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <nav>
            <a class='nav-item active' href="#about">About</a>
            <a class='nav-item' href="#skills">My skills</a>
            <a class='nav-item' href="#projects">Projects</a>
            <a class='nav-item' href="#contact">Contact</a>
        </nav>
        <section id="about" class="about">
            <h1>I'm Web Developer<br>based in Warsaw</h1>
            <img class="about-img" src="./img/about-img.svg" alt="człowiek pracujący na laptopie">
        </section>
        <section id="skills" class="skills">
            <div class="skills-title ">
                <h2>My skills</h2>
                <img src="./img/skills-books-img.svg" alt="ksiązki">
            </div>
            <div class="skills-display">
                <img src="./img/skills-man.svg" alt="Człowiek z mapą">
                <div class="skills-logos">
                    <i class="fa-brands fa-html5"></i>
                    <i class="fa-brands fa-css3-alt"></i>
                    <i class="fa-brands fa-bootstrap"></i>
                    <i class="fa-brands fa-js-square"></i>
                    <i class="fa-brands fa-react"></i>
                    <i class="fa-brands fa-figma"></i>
                </div>
            </div>

        </section>
        <section id="projects" class="projects">
            <div class="projects-title ">
                <img src="./img/project-title-img.svg" alt="ksiązki">
                <h2>Projects</h2>
            </div>

        </section>
        <section id="contact" class="contact">
            <div class="contact-title ">
                <h2>Leave me a message!</h2>
                <img src="./img/contact-title-img.svg" alt="ksiązki">
            </div>
            <div class="contact-box">
                <form class="contact-form" action="">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name...">
                    <label for="email">E-mail</label>
                    <input type="text" id="email" name="email" placeholder="Your e-mail...">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message..."
                        style="height:200px"></textarea>
                </form>
                <img src="./img/contact-img.svg" alt="Machający człowiek">
            </div>
        </section>


    </div>
    <script src="scrollSpy.js" async defer></script>
</body>

</html>
