<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>wallet manadżer wydatków</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/dc238c17a3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <a class="back-to-main" href="../index.html">Back to main</a>
    <div class="wrapper">
        <h1><i class="fa-solid fa-wallet"></i></i> Wallet</h1>
        <p class="wallet-description">Twój osobisty menedżer finansów</p>
        <div class="app">
            <div class="transactions-all">
                <p>LISTA TRANSAKCJI</p>
                <div class="transactions">
                    <div class="income">
                        <p>Przychód</p>
                    </div>
                    <div class="expenses">
                        <p>Wydatki</p>
                    </div>
                </div>
            </div>
            <div class="options">
                <p>DOSTĘPNE ŚRODKI</p>
                <p class="saldo">0zł</p>
                <div class="buttons">
                    <button class="add-transaction"></button>
                    <button class="delete-all"></button>
                </div>
                <p>WYBIERZ STYL</p>
                <div class="styles">
                    <div class="dark"></div>
                    <div class="light"></div>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js" async defer></script>
</body>

</html>
